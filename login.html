<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Poop Savvy — Sign in</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Poop Savvy">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="app.css">
<style>
  body {
    background: radial-gradient(1200px 600px at 10% 10%, #dbeafe 0%, transparent 60%),
                radial-gradient(1000px 500px at 90% 100%, #e0f2fe 0%, transparent 60%),
                #f4f8fb;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; padding-bottom: calc(env(safe-area-inset-bottom, 0) + 1rem);
  }
  .auth-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.25rem 2rem;
    width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(14,165,233,0.14), 0 2px 6px rgba(15,23,42,0.05);
    text-align: center;
  }
  .logo-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
    color: #fff; font-size: 34px;
    box-shadow: 0 8px 24px rgba(14,165,233,0.35);
    margin-bottom: 14px;
  }
  .brand-name {
    font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
    color: var(--text);
  }
  .tagline { font-size: 13px; color: var(--text-muted); margin-top: 4px; margin-bottom: 22px; }
  .google-btn {
    width: 100%;
    padding: 13px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--border-strong);
    background: #fff;
    color: var(--text);
    font-size: 15px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s, transform 0.08s;
  }
  .google-btn:hover { border-color: var(--accent-100); background: var(--surface-2); }
  .google-btn:active { transform: translateY(1px); }
  .google-btn svg { width: 20px; height: 20px; }
  .google-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--text-faint); font-size: 11px;
    margin: 18px 0 14px;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }
  .pwd-form .form-group { text-align: left; margin-top: 10px; }
  .pwd-form input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border-strong);
    font-size: 15px; outline: none;
    background: var(--surface-2);
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .pwd-form input:focus {
    border-color: var(--accent); background: #fff;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
  }
  .submit-btn {
    width: 100%; margin-top: 14px;
    padding: 13px 18px; border-radius: 10px; border: 0;
    background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 700;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--accent-600); }
  .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .msg {
    margin-top: 14px; padding: 10px 14px;
    border-radius: 10px; font-size: 13px;
    text-align: left;
    display: none;
  }
  .msg.show { display: block; }
  .msg small { display: block; margin-top: 4px; opacity: 0.8; font-weight: 500; font-size: 11.5px; }
  .msg.error { background: var(--red-50); color: var(--red-700); border: 1px solid #fecaca; }
  .msg.info  { background: var(--accent-50); color: var(--accent-600); border: 1px solid var(--accent-100); }
  .msg.loading { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
  .tiny { font-size: 11px; color: var(--text-faint); margin-top: 22px; }
  .toggle-pwd {
    background: transparent; border: 0;
    color: var(--text-muted); font-size: 13px; font-weight: 600;
    margin-top: 14px; cursor: pointer;
    text-decoration: underline;
  }
  .toggle-pwd:hover { color: var(--accent); }
  .pwd-form { display: none; }
  .pwd-form.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body data-page="login">
<div class="auth-card">
  <div class="logo-wrap">🐾</div>
  <div class="brand-name">Poop Savvy</div>
  <div class="tagline">Staff portal · DeSoto, TX</div>

  <button type="button" class="google-btn" id="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 48 48" aria-hidden="true">
      <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.3 35.1 26.8 36 24 36c-5.3 0-9.7-3.1-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.6l6.2 5.3C41.8 36.4 44 30.7 44 24c0-1.2-.1-2.3-.4-3.5z"/>
    </svg>
    <span id="google-btn-label">Continue with Google</span>
  </button>

  <div id="msg" class="msg"></div>

  <button type="button" class="toggle-pwd" onclick="togglePwd()">Use password instead</button>

  <form class="pwd-form" id="pwd-form" onsubmit="signInWithPassword(event)">
    <div class="divider">Email &amp; password</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" autocomplete="username" value="poopsavvydfw@gmail.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit-btn" id="pwd-submit">Sign In</button>
  </form>

  <div class="tiny">Access restricted to authorized staff accounts.</div>
</div>

<!-- Supabase UMD with CDN fallback -->
<script>
  (function () {
    const CDN_URLS = [
      "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js",
      "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js",
      "https://esm.sh/@supabase/supabase-js@2/dist/umd/supabase.js",
    ];
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src; s.onload = resolve;
        s.onerror = () => reject(new Error("Failed to load " + src));
        document.head.appendChild(s);
      });
    }
    window._loadSupabase = async function () {
      for (const url of CDN_URLS) {
        try { await loadScript(url); if (window.supabase) return; } catch (_) {}
      }
      throw new Error("Could not load Supabase client. Check your network or ad blockers.");
    };
  })();
</script>

<script>
  /* Self-contained auth logic — no app.js dependency, so this page never
     gets blocked by a race where app.js tries to redirect to login.html. */
  // Same-origin — requests go through Netlify's _redirects proxy to Supabase.
  const SUPA_URL  = window.location.origin;
  const SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoam90ZWxwdnhvbmt2a3ljc2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mjk1MDksImV4cCI6MjA5MTEwNTUwOX0.gp4L2V21UEckjniXYM10p4s_VEiuysa-XOOIasKnH3Y";
  const ALLOWED  = ["poopsavvydfw@gmail.com","joshjreed1@gmail.com","info@poop-savvy.com"];
  const REDIRECT_TO = window.location.origin + window.location.pathname; // same login page
  const POST_LOGIN = "index.html";

  let sb = null;

  function msg(type, text, sub) {
    const el = document.getElementById("msg");
    el.innerHTML = text + (sub ? `<small>${sub}</small>` : "");
    el.className = "msg show " + type;
  }
  function clearMsg() {
    document.getElementById("msg").className = "msg";
  }
  function humanize(err) {
    const raw = (err && err.message) ? String(err.message) : String(err || "Unknown error");
    if (/Failed to fetch|NetworkError|Load failed|Network request failed/i.test(raw))
      return { text: "Can't reach our sign-in server.", sub: "Check your internet connection, disable any ad blocker for this site, then try again." };
    if (/popup.*closed/i.test(raw))
      return { text: "Google sign-in window was closed.", sub: "Click the button again and complete sign-in." };
    if (/Invalid login credentials/i.test(raw))
      return { text: "Wrong email or password.", sub: "Double-check both and try again." };
    if (/Email not confirmed/i.test(raw))
      return { text: "Email not confirmed.", sub: "Check your inbox for the confirmation email." };
    if (/rate limit|too many/i.test(raw))
      return { text: "Too many attempts.", sub: "Wait a minute before trying again." };
    if (/not authorized/i.test(raw))
      return { text: "This account isn't authorized.", sub: "Sign in with a Poop Savvy staff email (josh or info@poop-savvy.com)." };
    return { text: raw, sub: null };
  }

  function togglePwd() {
    const f = document.getElementById("pwd-form");
    f.classList.toggle("show");
    if (f.classList.contains("show")) document.getElementById("password").focus();
  }

  async function bootstrap() {
    try { await window._loadSupabase(); }
    catch (e) {
      const h = humanize(e);
      msg("error", h.text, h.sub);
      document.getElementById("google-btn").disabled = true;
      return;
    }
    sb = window.supabase.createClient(SUPA_URL, SUPA_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, flowType: "pkce" },
    });

    // If the URL contains a ?code=... from Google, exchange it
    const params = new URLSearchParams(window.location.search);
    if (params.get("code")) {
      msg("loading", "Finishing sign-in…");
      try {
        const { data, error } = await sb.auth.exchangeCodeForSession(window.location.href);
        if (error) throw error;
        if (data?.session && ALLOWED.includes(data.session.user.email)) {
          // Clean URL, redirect
          window.history.replaceState({}, document.title, window.location.pathname);
          window.location.replace(POST_LOGIN); return;
        }
        await sb.auth.signOut();
        msg("error", "This Google account isn't authorized.", "Try a Poop Savvy staff account.");
        window.history.replaceState({}, document.title, window.location.pathname);
      } catch (e) {
        const h = humanize(e);
        msg("error", h.text, h.sub);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      return;
    }

    // If already signed in, skip straight to the app
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session && ALLOWED.includes(session.user.email)) {
        window.location.replace(POST_LOGIN); return;
      }
    } catch (_) {}
  }

  async function signInWithGoogle() {
    if (!sb) { msg("info", "Still loading — try again in a moment."); return; }
    clearMsg();
    const btn = document.getElementById("google-btn");
    const label = document.getElementById("google-btn-label");
    btn.disabled = true; label.textContent = "Opening Google…";
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: REDIRECT_TO,
          queryParams: { prompt: "select_account", access_type: "offline" },
        },
      });
      if (error) throw error;
      // The browser will navigate away — if not, re-enable
      setTimeout(() => { btn.disabled = false; label.textContent = "Continue with Google"; }, 2500);
    } catch (err) {
      const h = humanize(err);
      msg("error", h.text, h.sub);
      btn.disabled = false; label.textContent = "Continue with Google";
    }
  }

  async function signInWithPassword(e) {
    e.preventDefault();
    if (!sb) { msg("info", "Still loading — try again in a moment."); return; }
    clearMsg();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("pwd-submit");
    btn.disabled = true; btn.textContent = "Signing in…";
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      if (!ALLOWED.includes(data.user.email)) {
        await sb.auth.signOut();
        throw new Error("This account isn't authorized.");
      }
      msg("info", "Signed in! Redirecting…");
      window.location.replace(POST_LOGIN);
    } catch (err) {
      const h = humanize(err);
      msg("error", h.text, h.sub);
      btn.disabled = false; btn.textContent = "Sign In";
      document.getElementById("password").focus();
      document.getElementById("password").select();
    }
  }

  bootstrap();
</script>
</body>
</html>
